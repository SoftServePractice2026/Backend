version: '3.8'
services:
  cinema-db:
    image: postgres:16-alpine
    container_name: cinema-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: CinemaDb
    ports:
      - "5433:5432"  
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: